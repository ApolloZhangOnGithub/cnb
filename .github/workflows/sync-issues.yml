name: Sync Issues

on:
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled, assigned, unassigned]
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours as fallback
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      ISSUE_SOURCE_REPO: ${{ vars.ISSUE_SOURCE_REPO || github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Sync issues to /issues directory
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh issue list \
            --repo "$ISSUE_SOURCE_REPO" \
            --state all \
            --limit 1000 \
            --json number,title,state,body,labels,assignees,createdAt,updatedAt,closedAt \
            > /tmp/issues.json
          python -m lib.github_issues_sync --issues-dir issues --source-repo "$ISSUE_SOURCE_REPO" /tmp/issues.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add issues/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: update issues from GitHub

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          fi
