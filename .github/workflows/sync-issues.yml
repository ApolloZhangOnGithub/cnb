name: Sync Issues

on:
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled, assigned, unassigned]
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours as fallback
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull-requests: write

concurrency:
  group: sync-issues
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      ISSUE_SOURCE_REPO: ${{ vars.ISSUE_SOURCE_REPO || github.repository }}
      SYNC_BRANCH: github-actions/sync-issues
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'master' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Sync issues to /issues directory
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh issue list \
            --repo "$ISSUE_SOURCE_REPO" \
            --state all \
            --limit 1000 \
            --json number,title,state,body,labels,assignees,createdAt,updatedAt,closedAt \
            > /tmp/issues.json
          python -m lib.github_issues_sync --issues-dir issues --source-repo "$ISSUE_SOURCE_REPO" /tmp/issues.json

      - name: Commit and open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add issues/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: update issues from GitHub

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            git fetch origin "${SYNC_BRANCH}:refs/remotes/origin/${SYNC_BRANCH}" || true
            git push --force-with-lease origin "HEAD:${SYNC_BRANCH}"
            pr_body="$(printf '%s\n\n%s\n' \
              "Automated issue mirror update from GitHub Issues." \
              "This PR is maintained by the Sync Issues workflow because ${DEFAULT_BRANCH} is protected and cannot be updated directly.")"
            pr_url="https://github.com/${GITHUB_REPOSITORY}/compare/${DEFAULT_BRANCH}...${SYNC_BRANCH}?expand=1"
            pr_number="$(gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --head "$SYNC_BRANCH" \
              --base "$DEFAULT_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number // empty')"
            if [ -n "$pr_number" ]; then
              gh pr edit "$pr_number" \
                --repo "$GITHUB_REPOSITORY" \
                --body "$pr_body" || {
                  echo "::warning::Updated ${SYNC_BRANCH}, but could not update PR #${pr_number}. Check ${pr_url}"
                  printf '### Issue sync branch updated\n\nCould not update PR #%s automatically.\n\nOpen: %s\n' "$pr_number" "$pr_url" >> "$GITHUB_STEP_SUMMARY"
                }
            else
              gh pr create \
                --repo "$GITHUB_REPOSITORY" \
                --base "$DEFAULT_BRANCH" \
                --head "$SYNC_BRANCH" \
                --title "sync: update issues from GitHub" \
                --body "$pr_body" || {
                  echo "::warning::Updated ${SYNC_BRANCH}, but this repository does not allow GitHub Actions to create PRs. Open ${pr_url} manually or enable the repository Actions setting."
                  printf '### Issue sync branch updated\n\nThe workflow pushed generated issue files to `%s`, but could not create a PR with `GITHUB_TOKEN`.\n\nOpen: %s\n' "$SYNC_BRANCH" "$pr_url" >> "$GITHUB_STEP_SUMMARY"
                }
            fi
          fi
