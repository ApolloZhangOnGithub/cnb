name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check lib/ bin/board bin/swarm bin/dispatcher bin/dispatcher-watchdog bin/doctor bin/init bin/notify bin/registry bin/secret-scan bin/sync-version bin/check-changelog tests/
      - run: ruff format --check lib/ bin/board bin/swarm bin/dispatcher bin/dispatcher-watchdog bin/doctor bin/init bin/notify bin/registry bin/secret-scan bin/sync-version bin/check-changelog tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e . && pip install mypy
      - run: mypy lib/

  check-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # pull_request defaults to a synthetic merge commit whose message lacks
          # project trailers. Check the real head commit instead.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python bin/sync-version --check
      - name: Version must change on every push
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags origin "$GITHUB_BASE_REF"
            RANGE="origin/$GITHUB_BASE_REF...HEAD"
            PREV=$(git show "origin/$GITHUB_BASE_REF:VERSION" 2>/dev/null || echo "")
          else
            RANGE="HEAD~1..HEAD"
            PREV=$(git show HEAD~1:VERSION 2>/dev/null || echo "")
          fi
          CHANGED_FILES=$(git diff --name-only "$RANGE")
          NON_ISSUE_FILES=$(printf '%s\n' "$CHANGED_FILES" | grep -Ev '^(issues/|$)' || true)
          if [ -z "$NON_ISSUE_FILES" ]; then
            echo "Only generated issue mirror files changed; skipping VERSION bump requirement."
            exit 0
          fi
          CURR=$(cat VERSION)
          if [ "$PREV" = "$CURR" ] && [ -n "$PREV" ]; then
            echo "ERROR: VERSION unchanged ($CURR). Every commit to master must bump the version."
            echo "Use patch versions liberally: 0.5.1 → 0.5.2, not 0.6.0."
            exit 1
          fi
      - name: Require Co-Authored-By on every commit
        run: |
          TARGET=HEAD
          if [ "$GITHUB_EVENT_NAME" = "push" ] && git rev-parse -q --verify HEAD^2 >/dev/null; then
            TARGET=HEAD^2
          fi
          BODY=$(git log -1 --format='%b' "$TARGET")
          if ! echo "$BODY" | grep -qi 'co-authored-by:'; then
            echo "ERROR: Commit must include a Co-Authored-By trailer."
            echo "Example: Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
            exit 1
          fi
      - name: Changelog required for release versions
        run: python bin/check-changelog
      - name: Check npm publish status
        run: |
          LOCAL=$(cat VERSION)
          # Strip -dev suffix for comparison
          LOCAL_CLEAN=$(echo "$LOCAL" | sed 's/-dev$//')
          NPM=$(npm view claude-nb version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL_CLEAN" != "$NPM" ]; then
            echo "::warning::npm package is outdated: npm=$NPM local=$LOCAL_CLEAN. Run 'npm publish' to update."
          fi

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python bin/secret-scan --all

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Verify npm package tarball
        run: |
          set -euo pipefail
          mkdir -p /tmp/cnb-npm-pack
          tarball="$(npm pack --pack-destination /tmp/cnb-npm-pack)"
          tar -tzf "/tmp/cnb-npm-pack/$tarball" > /tmp/cnb-npm-pack/files.txt
          grep -qx "package/bin/cnb.js" /tmp/cnb-npm-pack/files.txt
          grep -qx "package/bin/cnb" /tmp/cnb-npm-pack/files.txt
          grep -qx "package/lib/cli.py" /tmp/cnb-npm-pack/files.txt
          grep -qx "package/VERSION" /tmp/cnb-npm-pack/files.txt

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]" 2>/dev/null || pip install -e .
      - run: pip install pytest
      - run: python -m pytest tests/ -v --tb=short
