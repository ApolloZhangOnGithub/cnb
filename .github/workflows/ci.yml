name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check lib/ bin/board bin/swarm bin/dispatcher bin/dispatcher-watchdog bin/doctor bin/init bin/notify bin/registry bin/secret-scan bin/sync-version tests/
      - run: ruff format --check lib/ bin/board bin/swarm bin/dispatcher bin/dispatcher-watchdog bin/doctor bin/init bin/notify bin/registry bin/secret-scan bin/sync-version tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e . && pip install mypy
      - run: mypy lib/

  check-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python bin/sync-version --check
      - name: Version must change on every push
        run: |
          PREV=$(git show HEAD~1:VERSION 2>/dev/null || echo "")
          CURR=$(cat VERSION)
          if [ "$PREV" = "$CURR" ] && [ -n "$PREV" ]; then
            echo "ERROR: VERSION unchanged ($CURR). Every commit to master must bump the version."
            echo "Use patch versions liberally: 0.5.1 → 0.5.2, not 0.6.0."
            exit 1
          fi
      - name: Require Co-Authored-By on every commit
        run: |
          BODY=$(git log -1 --format='%b' HEAD)
          if ! echo "$BODY" | grep -qi 'co-authored-by:'; then
            echo "ERROR: Commit must include a Co-Authored-By trailer."
            echo "Example: Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
            exit 1
          fi
      - name: Check npm publish status
        run: |
          LOCAL=$(cat VERSION)
          # Strip -dev suffix for comparison
          LOCAL_CLEAN=$(echo "$LOCAL" | sed 's/-dev$//')
          NPM=$(npm view claude-nb version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL_CLEAN" != "$NPM" ]; then
            echo "::warning::npm package is outdated: npm=$NPM local=$LOCAL_CLEAN. Run 'npm publish' to update."
          fi

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python bin/secret-scan --all

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]" 2>/dev/null || pip install -e .
      - run: pip install pytest
      - run: python -m pytest tests/ -v --tb=short
