name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.5.43"
        required: true
      changelog:
        description: "Markdown body for the CHANGELOG.md release section"
        required: true

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release
  cancel-in-progress: false

env:
  PACKAGE_NAME: claude-nb

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Use npm with trusted publishing support
        run: npm install -g npm@^11.10.0

      - name: Prepare release branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ inputs.version }}
          CHANGELOG_BODY: ${{ inputs.changelog }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if ! echo "$RELEASE_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: release version must look like 0.5.43 and must not include -dev."
            exit 1
          fi
          if [ -z "$(printf '%s' "$CHANGELOG_BODY" | tr -d '[:space:]')" ]; then
            echo "ERROR: changelog input must not be empty."
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "v$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "ERROR: tag v$RELEASE_VERSION already exists."
            exit 1
          fi
          if npm view "$PACKAGE_NAME@$RELEASE_VERSION" version >/dev/null 2>&1; then
            echo "ERROR: $PACKAGE_NAME@$RELEASE_VERSION already exists on npmjs."
            exit 1
          fi

          branch="release/v$RELEASE_VERSION"
          git checkout -B "$branch"
          printf '%s\n' "$RELEASE_VERSION" > VERSION
          python bin/sync-version

          python - <<'PY'
          import os
          from datetime import date
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          body = os.environ["CHANGELOG_BODY"].strip()
          path = Path("CHANGELOG.md")
          text = path.read_text()
          prefix = "# Changelog\n\n"
          if not text.startswith(prefix):
              raise SystemExit("CHANGELOG.md must start with '# Changelog'")
          section = f"## {version} ({date.today().isoformat()})\n\n{body}\n\n"
          path.write_text(prefix + section + text[len(prefix):])
          PY

          python bin/sync-version --check
          python bin/check-changelog
          bin/check-npm-package --install-smoke

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION package.json pyproject.toml CHANGELOG.md
          git commit -m "release: prepare v$RELEASE_VERSION

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push --force-with-lease origin "HEAD:$branch"

          pr_body="$(cat <<EOF
          Prepare release v$RELEASE_VERSION.

          After this PR merges:

          1. Create GitHub Release tag \`v$RELEASE_VERSION\`.
          2. The Publish npm Release workflow publishes \`$PACKAGE_NAME@$RELEASE_VERSION\`.
          3. The same workflow mirrors the release to GitHub Packages.

          Generated by Prepare Release.
          EOF
          )"

          pr_number="$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$branch" \
            --base "$DEFAULT_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty' || true)"
          pr_status=0
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --repo "$GITHUB_REPOSITORY" --title "Release v$RELEASE_VERSION" --body "$pr_body" || pr_status=$?
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base "$DEFAULT_BRANCH" \
              --head "$branch" \
              --title "Release v$RELEASE_VERSION" \
              --body "$pr_body" || pr_status=$?
          fi

          if [ "$pr_status" -ne 0 ]; then
            compare_url="https://github.com/$GITHUB_REPOSITORY/compare/$DEFAULT_BRANCH...$branch?expand=1"
            echo "::warning::Release branch $branch was pushed, but GitHub Actions could not create or update the PR. Open it manually: $compare_url"
            {
              echo "### Release branch ready"
              echo
              echo "- Branch: \`$branch\`"
              echo "- Manual PR URL: $compare_url"
              echo
              echo "The repository may have disabled GitHub Actions PR creation. The release branch and validation commit were still created."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$branch" || {
            echo "::warning::Could not dispatch CI for $branch. Open the release PR and run checks manually."
          }
          gh workflow run codeql.yml --repo "$GITHUB_REPOSITORY" --ref "$branch" || {
            echo "::warning::Could not dispatch CodeQL for $branch. Open the release PR and run checks manually."
          }
