name: Feature request
description: Propose a user-facing feature or capability.
title: "[Feature]: "
labels: ["feature"]
body:
  - type: checkboxes
    id: context-check
    attributes:
      label: Context check
      description: ROADMAP.md is the priority index, not the only source of truth. P0/P1 incidents may be filed first and backfilled later.
      options:
        - label: I checked ROADMAP.md and understand how this relates to current priorities, or this is a P0/P1 incident that will be backfilled.
          required: true
        - label: I searched open issues and did not find an obvious duplicate or issue I can extend.
          required: true
        - label: I searched relevant docs, PRs, and branches, or documented why that was skipped for an urgent incident.
          required: true
        - label: Any remaining uncertainty is called out below.
          required: true
  - type: textarea
    id: context-relation
    attributes:
      label: Relationship to existing context
      description: Link related roadmap items, issues, PRs, design docs, or branches. If none were found, list the keywords you searched.
      placeholder: "Related to #42 but does not overlap because... Searched: ownership handoff / transfer / offboard."
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Phase label
      description: Apply the matching label after opening the issue if GitHub does not add it automatically.
      options:
        - phase:1
        - phase:2
        - phase:3
    validations:
      required: true
  - type: dropdown
    id: type-label
    attributes:
      label: Type label
      description: Apply the matching label after opening the issue if GitHub does not add it automatically.
      options:
        - feature
        - infra
        - ownership
        - org-design
        - experiment
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem and goal
      description: What should change, and why?
    validations:
      required: true
  - type: textarea
    id: design
    attributes:
      label: Design notes
      description: Proposed approach, affected areas, tradeoffs, and risks.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete checks that prove the feature is complete.
      placeholder: |
        - Command X does Y.
        - Existing workflow Z still works.
        - Tests cover the default path and one boundary case.
    validations:
      required: true
