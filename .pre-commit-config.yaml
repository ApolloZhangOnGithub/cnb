repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: secret-scan
        name: Block secrets from being committed
        entry: bin/secret-scan
        language: python
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
      - id: readme-sync
        name: README bilingual sync check
        entry: bin/check-readme-sync
        language: python
        files: README.*\.md$
        pass_filenames: false
